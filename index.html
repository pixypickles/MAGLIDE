<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#07111f">
<title>Floating Magic Fighter v4</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#030914;color:#fff;font-family:Arial,"Noto Sans JP",sans-serif;touch-action:none}
#wrap{position:fixed;inset:0;background:radial-gradient(circle at 50% 43%,#123a61 0,#06182a 46%,#020710 100%)}
canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
#hud{position:absolute;left:18px;right:18px;top:max(14px,env(safe-area-inset-top));display:flex;justify-content:space-between;pointer-events:none;font-weight:bold;font-size:16px;text-shadow:0 2px 3px #000}
.life{width:43%}.life.enemy{text-align:right}
.bar{height:18px;border:3px solid #fff;border-radius:12px;background:#111;overflow:hidden;box-shadow:0 2px 5px #0008}
.fill{width:100%;height:100%;background:linear-gradient(#63ffb0,#00bd62);transition:width .1s}
.enemy .fill{margin-left:auto;background:linear-gradient(#ff8ea0,#eb3757)}
#stick{position:absolute;left:max(25px,env(safe-area-inset-left));bottom:max(38px,env(safe-area-inset-bottom));width:132px;height:132px;border:5px solid #ffffff75;border-radius:50%;background:#ffffff10}
#knob{position:absolute;left:36px;top:36px;width:56px;height:56px;border:4px solid white;border-radius:50%;background:#afb4bd;box-shadow:0 3px 10px #000}
#buttons{position:absolute;right:max(20px,env(safe-area-inset-right));bottom:max(24px,env(safe-area-inset-bottom));width:224px;height:224px}
.btn{position:absolute;width:76px;height:76px;border:4px solid white;border-radius:50%;color:#fff;font-weight:bold;font-size:31px;line-height:28px;box-shadow:0 4px 12px #0009;user-select:none;-webkit-user-select:none}
.btn small{display:block;font-size:11px;line-height:16px}
#a{left:74px;top:0;background:#168be5}
#g{left:0;top:74px;background:#11a358}
#b{right:0;top:74px;background:#ed9100}
#c{left:74px;bottom:0;background:#8b43e2}
#message{position:absolute;left:50%;top:52%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;font-weight:bold;text-shadow:0 2px 5px #000;opacity:0}
#message.show{animation:msg 1s}
@keyframes msg{0%,100%{opacity:0}20%,80%{opacity:1}}
#error{display:none;position:absolute;left:12px;right:12px;top:80px;padding:12px;background:#9d1530;border:2px solid white;border-radius:8px;z-index:20;font-size:13px}
@media(max-width:430px){
 #stick{width:116px;height:116px}
 #knob{left:30px;top:30px;width:52px;height:52px}
 #buttons{width:204px;height:204px}
 .btn{width:70px;height:70px}
 #a{left:67px}.g{left:0}#g{top:67px}#b{top:67px}#c{left:67px}
}
</style>
</head>
<body>
<div id="wrap">
<canvas id="game"></canvas>
<div id="hud">
 <div class="life">PLAYER<div class="bar"><div class="fill" id="php"></div></div></div>
 <div class="life enemy">ENEMY<div class="bar"><div class="fill" id="ehp"></div></div></div>
</div>
<div id="stick"><div id="knob"></div></div>
<div id="buttons">
 <button class="btn" id="a">A<small>魔力弾</small></button>
 <button class="btn" id="g">G<small>ガード</small></button>
 <button class="btn" id="b">B<small>キック</small></button>
 <button class="btn" id="c">C<small>移動技</small></button>
</div>
<div id="message"></div>
<div id="error"></div>
</div>
<script>
(function(){
"use strict";
var canvas=document.getElementById("game");
var ctx=canvas.getContext("2d");
var W=960,H=540,last=Date.now(),time=0;
var input={x:0,y:0,shot:false,kick:false,dash:false,guard:false,shotTap:false,kickTap:false,dashTap:false,guardTap:false};
var shots=[],effects=[];
var p=makeFighter(250,270,"#248cff",1);
var e=makeFighter(710,270,"#eb4059",-1);

function fail(err){
 var box=document.getElementById("error");
 box.style.display="block";
 box.innerHTML="ゲームエラー: "+String(err && err.message ? err.message : err);
}
window.onerror=function(msg,src,line){fail(msg+" ("+line+")");};

function resize(){
 var dpr=Math.min(window.devicePixelRatio||1,2);
 var r=canvas.getBoundingClientRect();
 canvas.width=Math.max(1,Math.floor(r.width*dpr));
 canvas.height=Math.max(1,Math.floor(r.height*dpr));
}
window.addEventListener("resize",resize);
resize();

function makeFighter(x,y,color,face){
 return {x:x,y:y,baseY:y,color:color,face:face,hp:100,state:"idle",timer:0,shotCd:0,kickCd:0,dashCd:0,
 guard:false,guardAge:99,inv:0,dashX:0,dashY:0,startX:x,startY:y,hitDone:false,seed:Math.random()*10};
}
function norm(x,y){var l=Math.sqrt(x*x+y*y)||1;return{x:x/l,y:y/l};}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}

function setupButton(id,name){
 var b=document.getElementById(id);
 function down(ev){ev.preventDefault();input[name]=true;input[name+"Tap"]=true;}
 function up(ev){ev.preventDefault();input[name]=false;}
 b.addEventListener("touchstart",down,{passive:false});
 b.addEventListener("touchend",up,{passive:false});
 b.addEventListener("touchcancel",up,{passive:false});
 b.addEventListener("mousedown",down);
 b.addEventListener("mouseup",up);
 b.addEventListener("mouseleave",up);
}
setupButton("a","shot");setupButton("b","kick");setupButton("c","dash");setupButton("g","guard");

var stick=document.getElementById("stick"),knob=document.getElementById("knob"),stickOn=false;
function stickMove(clientX,clientY){
 var r=stick.getBoundingClientRect(),cx=r.left+r.width/2,cy=r.top+r.height/2;
 var dx=clientX-cx,dy=clientY-cy,max=r.width*.34,l=Math.sqrt(dx*dx+dy*dy)||1;
 if(l>max){dx=dx/l*max;dy=dy/l*max;}
 input.x=dx/max;input.y=dy/max;
 knob.style.transform="translate("+dx+"px,"+dy+"px)";
}
stick.addEventListener("touchstart",function(ev){ev.preventDefault();stickOn=true;var t=ev.changedTouches[0];stickMove(t.clientX,t.clientY);},{passive:false});
stick.addEventListener("touchmove",function(ev){if(!stickOn)return;ev.preventDefault();var t=ev.changedTouches[0];stickMove(t.clientX,t.clientY);},{passive:false});
function stickEnd(){stickOn=false;input.x=0;input.y=0;knob.style.transform="translate(0,0)";}
stick.addEventListener("touchend",stickEnd,{passive:false});stick.addEventListener("touchcancel",stickEnd,{passive:false});
stick.addEventListener("mousedown",function(ev){stickOn=true;stickMove(ev.clientX,ev.clientY);});
window.addEventListener("mousemove",function(ev){if(stickOn)stickMove(ev.clientX,ev.clientY);});
window.addEventListener("mouseup",stickEnd);

var keys={};
window.addEventListener("keydown",function(ev){
 var k=ev.key.toLowerCase();keys[k]=true;
 if(k==="j")input.shotTap=true;if(k==="k")input.kickTap=true;if(k==="l")input.dashTap=true;if(k==="i")input.guardTap=true;
});
window.addEventListener("keyup",function(ev){keys[ev.key.toLowerCase()]=false;});

function fire(f,target,mx,my){
 if(f.shotCd>0)return;f.shotCd=.3;
 var sx=f.x+f.face*28,sy=f.y;
 if(my<-.45){sx=f.x;sy=f.y-32}else if(my>.45){sx=f.x;sy=f.y+32}
 var mode="normal";
 if(Math.abs(mx)>Math.abs(my)&&mx*f.face>.4)mode="fast";
 if(Math.abs(mx)>Math.abs(my)&&mx*f.face<-.4)mode="slow";
 var n=norm(target.x-sx,target.y-sy),sp=mode==="fast"?520:mode==="slow"?150:340;
 shots.push({x:sx,y:sy,vx:n.x*sp,vy:n.y*sp,speed:sp,mode:mode,owner:f,life:2.5});
}
function kick(f,target){
 if(f.kickCd>0)return;f.kickCd=.72;f.state="kick";f.timer=.36;f.face=target.x>=f.x?1:-1;
 if(Math.abs(target.x-f.x)<105&&Math.abs(target.y-f.y)<85){
  damage(target,22,true,f.x);effects.push({type:"kick",x:f.x+f.face*25,y:f.y,face:f.face,life:.25,max:.25,color:f.color});
 }
}
function dash(f,mx,my,target){
 if(f.dashCd>0)return;f.dashCd=1;f.state="dash";f.timer=.48;f.startX=f.x;f.startY=f.y;f.hitDone=false;
 if(Math.abs(mx)+Math.abs(my)<.3){mx=f.face;my=0}
 if(Math.abs(mx)>Math.abs(my)){f.dashX=mx>0?1:-1;f.dashY=0}else{f.dashX=0;f.dashY=my>0?1:-1}
}
function damage(f,amount,heavy,sourceX){
 if(f.inv>0)return;
 f.hp=Math.max(0,f.hp-amount);
 var dir=(f.x>sourceX)?1:-1;
 f.x=clamp(f.x+dir*(heavy?58:30),45,915);
 f.y+=heavy?56:24;
 f.inv=heavy?.22:.12;
 effects.push({type:"hit",x:f.x,y:f.y,life:.28,max:.28,heavy:heavy});
 effects.push({type:"impactRing",x:f.x,y:f.y,life:.26,max:.26,color:f.color});
 if(heavy||f.y>H-34){f.state="fall";f.timer=.20;f.y=H+60}
 if(f.hp<=0){f.hp=100;f.x=f===p?250:710;f.y=270;f.state="idle";}
}
function updateFighter(f,target,dt,mx,my,player){
 f.shotCd=Math.max(0,f.shotCd-dt);f.kickCd=Math.max(0,f.kickCd-dt);f.dashCd=Math.max(0,f.dashCd-dt);f.inv=Math.max(0,f.inv-dt);
 f.face=target.x>=f.x?1:-1;
 if(f.state==="fall"){f.timer-=dt;if(f.timer<=0){f.state="rise";f.y=H+35}return}
 if(f.state==="rise"){f.y-=650*dt;if(f.y<=270){f.y=270;f.state="idle";f.inv=.5}return}
 if(f.state==="kick"){f.timer-=dt;if(f.timer<=0)f.state="idle";return}
 if(f.state==="dash"){
  f.timer-=dt;var q=1-f.timer/.48;
  if(f.dashX){f.x=f.startX+f.dashX*430*q;f.y=f.startY+Math.sin(q*Math.PI*2)*48}
  else{f.y=f.startY+f.dashY*390*q;f.x=f.startX+Math.sin(q*Math.PI)*110*(f.dashY<0?1:-1)}
  effects.push({type:"trail",x:f.x,y:f.y,life:.12,max:.12,color:f.color});
  if(!f.hitDone&&Math.sqrt(Math.pow(f.x-target.x,2)+Math.pow(f.y-target.y,2))<72){f.hitDone=true;damage(target,12,false,f.x)}
  if(f.timer<=0){f.state="idle";f.x=clamp(f.x,45,915);f.y=clamp(f.y,85,475)}
  return;
 }
 f.x=clamp(f.x+mx*260*dt,45,915);f.y=clamp(f.y+my*260*dt,85,475);
}

function ai(dt){
 var dx=p.x-e.x,dy=p.y-e.y,d=Math.sqrt(dx*dx+dy*dy),mx=0,my=0;
 if(d>290){mx=dx>0?.55:-.55;my=dy>0?.2:-.2}else if(d<140){mx=dx>0?-.5:.5}
 updateFighter(e,p,dt,mx,my,false);
 var r=Math.random();
 if(r<dt*.65)fire(e,p,mx,my);
 if(d<105&&r<dt*1.7)kick(e,p);
 if(r<dt*.18)dash(e,mx||e.face,my,p);
 e.guard=false;e.guardAge=99;
 for(var i=0;i<shots.length;i++){
  var s=shots[i];if(s.owner!==e&&Math.abs(s.x-e.x)<100&&Math.abs(s.y-e.y)<70&&Math.random()<dt*5){e.guard=true;e.guardAge=0}
 }
}
function updateShots(dt){
 for(var i=shots.length-1;i>=0;i--){
  var s=shots[i],target=s.owner===p?e:p,n=norm(target.x-s.x,target.y-s.y);
  s.vx+=n.x*70*dt;s.vy+=n.y*70*dt;
  if(s.mode==="fast")s.speed=Math.max(340,s.speed-360*dt);
  if(s.mode==="slow")s.speed=Math.min(340,s.speed+360*dt);
  var v=norm(s.vx,s.vy);s.vx=v.x*s.speed;s.vy=v.y*s.speed;s.x+=s.vx*dt;s.y+=s.vy*dt;s.life-=dt;
  var dd=Math.sqrt(Math.pow(s.x-target.x,2)+Math.pow(s.y-target.y,2));
  if(dd<34){
   if(target.guard&&target.guardAge<.14){s.owner=target;s.vx=-s.vx;s.vy=-s.vy;s.speed=500;s.life=1.4;effects.push({type:"guard",x:target.x,y:target.y,life:.25,max:.25})}
   else{damage(target,target.guard?2:5,false,s.owner.x);shots.splice(i,1)}
  }else if(s.life<=0||s.x<-50||s.x>1010||s.y<-50||s.y>590)shots.splice(i,1);
 }
}
function update(dt){
 time+=dt;
 var mx=input.x,my=input.y;
 if(keys.arrowleft||keys.a)mx=-1;if(keys.arrowright||keys.d)mx=1;if(keys.arrowup||keys.w)my=-1;if(keys.arrowdown||keys.s)my=1;
 var n=Math.sqrt(mx*mx+my*my);if(n>1){mx/=n;my/=n}
 p.guard=input.guard||!!keys.i;if(input.guardTap)p.guardAge=0;else p.guardAge=p.guard?p.guardAge+dt:99;
 updateFighter(p,e,dt,mx,my,true);
 if(input.shotTap||keys.j)fire(p,e,mx,my);
 if(input.kickTap||keys.k)kick(p,e);
 if(input.dashTap||keys.l)dash(p,mx,my,e);
 ai(dt);updateShots(dt);
 for(var i=effects.length-1;i>=0;i--){effects[i].life-=dt;if(effects[i].life<=0)effects.splice(i,1)}
 input.shotTap=input.kickTap=input.dashTap=input.guardTap=false;
 document.getElementById("php").style.width=p.hp+"%";document.getElementById("ehp").style.width=e.hp+"%";
}
function worldTransform(){
 var cw=canvas.width,ch=canvas.height,scale=Math.min(cw/W,ch/H),ox=(cw-W*scale)/2,oy=(ch-H*scale)/2;
 ctx.setTransform(scale,0,0,scale,ox,oy);
}
function drawBg(){
 var g=ctx.createRadialGradient(480,260,20,480,260,520);g.addColorStop(0,"#123e66");g.addColorStop(1,"#020a15");ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
 ctx.strokeStyle="rgba(100,190,255,.06)";ctx.lineWidth=1;
 for(var x=0;x<W;x+=48){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
 for(var y=0;y<H;y+=48){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
}
function roundRect(x,y,w,h,r){
 ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);
 ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}
function drawFighter(f){
 if(f.state==="fall")return;
 var hover=f.state==="idle"?Math.sin(time*2.4+f.seed)*5:0;
 ctx.save();ctx.translate(f.x,f.y+hover);ctx.scale(f.face,1);
 if(f.state==="dash")ctx.rotate(-f.dashY*.55);
 ctx.lineCap="round";ctx.lineJoin="round";ctx.strokeStyle="#07101d";ctx.lineWidth=6;
 ctx.fillStyle=f.color;ctx.beginPath();ctx.arc(0,-25,18,0,Math.PI*2);ctx.fill();ctx.stroke();
 ctx.fillStyle="#efbd93";ctx.beginPath();ctx.arc(0,-20,13,0,Math.PI*2);ctx.fill();
 ctx.fillStyle="#10141d";ctx.beginPath();ctx.arc(-2,-29,15,Math.PI,Math.PI*2);ctx.fill();
 ctx.strokeStyle=f.color;ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(-15,-29);ctx.lineTo(15,-29);ctx.stroke();
 ctx.fillStyle="#f0f5ff";ctx.strokeStyle="#07101d";ctx.lineWidth=6;roundRect(-17,-7,34,38,8);ctx.fill();ctx.stroke();
 ctx.strokeStyle=f.color;ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(0,-4);ctx.lineTo(0,27);ctx.stroke();
 ctx.strokeStyle="#07101d";ctx.lineWidth=7;
 ctx.beginPath();ctx.moveTo(-14,2);ctx.lineTo(-24,13);ctx.stroke();ctx.beginPath();ctx.moveTo(14,2);ctx.lineTo(24,10);ctx.stroke();
 if(f.state==="kick"){
  ctx.beginPath();ctx.moveTo(-8,25);ctx.lineTo(-13,42);ctx.stroke();
  ctx.beginPath();ctx.moveTo(8,25);ctx.lineTo(29,-30);ctx.stroke();
  ctx.shadowColor="#56d8ff";ctx.shadowBlur=18;ctx.fillStyle="#e8fbff";ctx.beginPath();ctx.arc(30,-34,9,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  ctx.strokeStyle="#68d6ff";ctx.lineWidth=8;ctx.beginPath();ctx.arc(3,4,53,-1.32,.55);ctx.stroke();
 }else{
  ctx.beginPath();ctx.moveTo(-8,25);ctx.lineTo(-13,40);ctx.stroke();ctx.beginPath();ctx.moveTo(8,25);ctx.lineTo(16,34);ctx.stroke();
 }
 ctx.fillStyle="#111";ctx.beginPath();ctx.arc(-5,-20,2,0,Math.PI*2);ctx.arc(5,-20,2,0,Math.PI*2);ctx.fill();
 if(f.guard){ctx.strokeStyle="#7cffae";ctx.lineWidth=5;ctx.beginPath();ctx.arc(0,0,35,0,Math.PI*2);ctx.stroke()}
 if(f.state==="dash"){
  ctx.save();
  ctx.globalAlpha=.72;
  var bg=ctx.createRadialGradient(0,0,8,0,0,46);
  bg.addColorStop(0,"rgba(220,250,255,.95)");
  bg.addColorStop(.45,"rgba(66,190,255,.7)");
  bg.addColorStop(1,"rgba(20,110,255,.08)");
  ctx.fillStyle=bg;ctx.beginPath();ctx.arc(0,0,46,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle="#8fe7ff";ctx.lineWidth=6;ctx.beginPath();ctx.arc(0,0,42,0,Math.PI*2);ctx.stroke();
  ctx.strokeStyle="rgba(255,255,255,.85)";ctx.lineWidth=2;ctx.beginPath();ctx.arc(-8,-8,26,-2.6,-.5);ctx.stroke();
  ctx.restore();
 }
 ctx.restore();
}
function draw(){
 ctx.setTransform(1,0,0,1,0,0);ctx.clearRect(0,0,canvas.width,canvas.height);worldTransform();drawBg();
 for(var i=0;i<effects.length;i++){
  var z=effects[i],a=z.life/z.max;ctx.save();ctx.globalAlpha=a;ctx.translate(z.x,z.y);
  if(z.type==="trail"){ctx.fillStyle=z.color;ctx.beginPath();ctx.arc(0,0,12+(1-a)*27,0,Math.PI*2);ctx.fill()}
  if(z.type==="hit"){ctx.strokeStyle="#fff";ctx.lineWidth=5;for(var j=0;j<8;j++){ctx.rotate(Math.PI/4);ctx.beginPath();ctx.moveTo(8,0);ctx.lineTo(z.heavy?46:34,0);ctx.stroke()}}
  if(z.type==="guard"){ctx.strokeStyle="#7cffae";ctx.lineWidth=8;ctx.beginPath();ctx.arc(0,0,43,0,Math.PI*2);ctx.stroke()}
  if(z.type==="kick"){ctx.scale(z.face,1);ctx.strokeStyle="#68d6ff";ctx.lineWidth=10;ctx.beginPath();ctx.arc(0,0,55,-1.3,.55);ctx.stroke()}
  if(z.type==="impactRing"){ctx.strokeStyle="#ffffff";ctx.lineWidth=8;ctx.beginPath();ctx.arc(0,0,12+(1-a)*38,0,Math.PI*2);ctx.stroke()}
  ctx.restore();
 }
 for(var k=0;k<shots.length;k++){var s=shots[k];ctx.save();ctx.translate(s.x,s.y);ctx.shadowColor=s.owner.color;ctx.shadowBlur=16;ctx.fillStyle=s.owner.color;ctx.beginPath();ctx.arc(0,0,9,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.strokeStyle="#fff";ctx.lineWidth=3;ctx.stroke();ctx.restore()}
 drawFighter(p);drawFighter(e);
}
function loop(){
 try{
  var now=Date.now(),dt=Math.min(.033,(now-last)/1000);last=now;update(dt);draw();requestAnimationFrame(loop);
 }catch(err){fail(err)}
}
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
